<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capitoli - KitsuManga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
      padding-top: 70px;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 2rem;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 1000;
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    }
    .back-btn {
      background: rgba(139, 92, 246, 0.3);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .back-btn:hover {
      background: rgba(139, 92, 246, 0.6);
    }
    .site-logo {
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #10b981, #34d399, #8b5cf6, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .manga-info {
      display: flex;
      gap: 30px;
      margin-bottom: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .manga-info img {
      width: 150px;
      border-radius: 15px;
    }
    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      max-height: 500px;
      overflow-y: auto;
      padding: 10px;
    }
    .chapter-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chapter-card:hover {
      transform: translateY(-5px);
      background: rgba(139, 92, 246, 0.3);
      border-color: #8b5cf6;
    }
    .chapter-number {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c4b5fd;
    }
    .total-input {
      background: rgba(255,255,255,0.1);
      border: 1px solid #8b5cf6;
      border-radius: 10px;
      padding: 8px 12px;
      color: white;
      width: 100px;
      text-align: center;
    }
    .update-btn {
      background: #8b5cf6;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      margin-left: 10px;
      cursor: pointer;
    }
    .update-btn:hover {
      background: #a78bfa;
    }
    .range-input {
      width: 200px;
      margin: 0 10px;
    }
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html" class="back-btn">← Libreria</a>
  <span class="site-logo">📚 KitsuManga</span>
</div>

<div class="container">
  <div id="content"></div>
</div>

<script>
  // PARAMETRI URL
  const urlParams = new URLSearchParams(window.location.search);
  let mangaId = urlParams.get('id');
  let mangaTitle = urlParams.get('title');
  let mangaCover = urlParams.get('cover');
  
  if (mangaTitle) mangaTitle = decodeURIComponent(mangaTitle);
  else mangaTitle = 'Manga';
  
  if (mangaCover) mangaCover = decodeURIComponent(mangaCover);
  else mangaCover = '';
  
  if (!mangaId || mangaId === 'null') {
    document.getElementById('content').innerHTML = `<div class="error" style="text-align:center;padding:50px;">❌ ID non specificato</div>`;
    throw new Error('No ID');
  }
  
  document.title = `${mangaTitle} - Capitoli`;
  
  const api = 'https://www.mangaworld.cx';
  
  // Mappa dei manga conosciuti con il loro numero totale di capitoli
  // Puoi espandere questa lista
  const knownManga = {
    '1708': { name: 'One Piece', chapters: 1130 },
    '1': { name: 'Naruto', chapters: 700 },
    '2': { name: 'Dragon Ball', chapters: 520 },
    '3': { name: 'Attack on Titan', chapters: 139 },
    '4': { name: 'My Hero Academia', chapters: 430 },
    '5': { name: 'Demon Slayer', chapters: 205 },
    '6': { name: 'Jujutsu Kaisen', chapters: 270 },
    '7': { name: 'Death Note', chapters: 108 },
    '8': { name: 'Fullmetal Alchemist', chapters: 108 },
    '9': { name: 'Tokyo Ghoul', chapters: 179 },
    '10': { name: 'One Punch Man', chapters: 250 }
  };
  
  // Numero totale di capitoli (default 100, o usa quello nella mappa)
  let totalChapters = knownManga[mangaId] ? knownManga[mangaId].chapters : 100;
  
  function renderChapters() {
    const chapters = [];
    // Mostra dal più recente al più vecchio
    for (let i = totalChapters; i >= 1; i--) {
      chapters.push({
        number: i,
        url: `${api}/read/${mangaId}/${i}?style=list`
      });
    }
    
    const contentDiv = document.getElementById('content');
    
    contentDiv.innerHTML = `
      <div class="manga-info">
        <img src="${mangaCover}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(mangaTitle)}'">
        <div style="flex:1">
          <h1>${escapeHtml(mangaTitle)}</h1>
          <p style="margin-top: 10px; opacity: 0.8;">📚 ${totalChapters} capitoli totali</p>
          
          <div class="controls-bar">
            <span>📖 Mostra capitoli:</span>
            <input type="range" id="chapterRange" class="range-input" min="10" max="${Math.min(totalChapters, 500)}" value="${Math.min(totalChapters, 100)}" step="10">
            <input type="number" id="chapterCount" class="total-input" value="${Math.min(totalChapters, 100)}" min="10" max="${Math.min(totalChapters, 500)}" step="10">
            <button id="updateBtn" class="update-btn">Aggiorna</button>
          </div>
          
          <div style="margin-top: 10px;">
            <small>💡 I capitoli si aprono su MangaWorld. Se non caricano, clicca su "Apri su MangaWorld" in fondo alla pagina.</small>
          </div>
        </div>
      </div>
      <h2 style="margin-bottom: 20px;">📖 Capitoli disponibili</h2>
      <div class="chapters-grid" id="chaptersGrid"></div>
      <div style="text-align: center; margin-top: 30px; padding: 20px;">
        <a href="${api}/manga/${mangaId}" target="_blank" style="color: #8b5cf6; text-decoration: none; background: rgba(139,92,246,0.2); padding: 10px 20px; border-radius: 25px;">🌐 Apri su MangaWorld (se il lettore non funziona)</a>
      </div>
    `;
    
    const grid = document.getElementById('chaptersGrid');
    const limit = parseInt(document.getElementById('chapterCount').value);
    
    // Mostra solo gli ultimi 'limit' capitoli (i più recenti)
    const recentChapters = chapters.slice(0, limit);
    
    recentChapters.forEach(chapter => {
      const card = document.createElement('div');
      card.className = 'chapter-card';
      card.innerHTML = `
        <div class="chapter-number">${chapter.number}</div>
        <div>Capitolo ${chapter.number}</div>
        <div style="margin-top: 10px; font-size: 0.7rem;">▶ Leggi</div>
      `;
      card.onclick = () => {
        // Apri direttamente su MangaWorld (evita problemi CORS)
        window.open(chapter.url, '_blank');
        // Mostra un messaggio
        const toast = document.createElement('div');
        toast.textContent = `📖 Apertura capitolo ${chapter.number} su MangaWorld...`;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#8b5cf6';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '25px';
        toast.style.zIndex = '9999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      };
      grid.appendChild(card);
    });
    
    // Sincronizza range e input
    const range = document.getElementById('chapterRange');
    const numberInput = document.getElementById('chapterCount');
    
    range.oninput = () => {
      numberInput.value = range.value;
    };
    
    numberInput.oninput = () => {
      let val = parseInt(numberInput.value);
      if (val < 10) val = 10;
      if (val > totalChapters) val = totalChapters;
      numberInput.value = val;
      range.value = val;
    };
    
    document.getElementById('updateBtn').onclick = () => {
      const newLimit = parseInt(numberInput.value);
      if (newLimit > 0 && newLimit <= totalChapters) {
        renderChapters();
      }
    };
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  renderChapters();
</script>

</body>
</html>

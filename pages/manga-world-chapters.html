<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capitoli - KitsuManga</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: white;
      padding-top: 70px;
    }
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1rem 2rem;
      background: rgba(10, 10, 20, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 1000;
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    }
    .back-btn {
      background: rgba(139, 92, 246, 0.3);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .back-btn:hover {
      background: rgba(139, 92, 246, 0.6);
    }
    .site-logo {
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #10b981, #34d399, #8b5cf6, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .manga-info {
      display: flex;
      gap: 30px;
      margin-bottom: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .manga-info img {
      width: 150px;
      border-radius: 15px;
    }
    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
    }
    .chapter-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chapter-card:hover {
      transform: translateY(-5px);
      background: rgba(139, 92, 246, 0.3);
      border-color: #8b5cf6;
    }
    .chapter-number {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c4b5fd;
    }
    .loading, .error {
      text-align: center;
      padding: 50px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html" class="back-btn">← Libreria</a>
  <span class="site-logo">📚 KitsuManga</span>
</div>

<div class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Caricamento capitoli...</div>
    </div>
  </div>
</div>

<script src="../js/manga-world-api.js"></script>

<script>
  // ============================================================
  // LEGGI PARAMETRI URL
  // ============================================================
  const urlParams = new URLSearchParams(window.location.search);
  let mangaId = urlParams.get('id');
  let mangaTitle = urlParams.get('title');
  let mangaCover = urlParams.get('cover');
  
  if (mangaTitle) {
    mangaTitle = decodeURIComponent(mangaTitle);
  } else {
    mangaTitle = 'Manga';
  }
  
  if (mangaCover) {
    mangaCover = decodeURIComponent(mangaCover);
  } else {
    mangaCover = '';
  }
  
  console.log('📝 Manga ID:', mangaId);
  console.log('📝 Manga Title:', mangaTitle);
  
  if (!mangaId || mangaId === 'null' || mangaId === 'undefined') {
    document.getElementById('content').innerHTML = `
      <div class="error">
        ❌ ID manga non specificato<br>
        <a href="../index.html" style="color: #8b5cf6;">← Torna alla libreria</a>
      </div>
    `;
    throw new Error('ID mancante');
  }
  
  document.title = `${mangaTitle} - Capitoli`;
  
  // ============================================================
  // USA LA NUOVA API
  // ============================================================
  const mangaAPI = new MangaWorldAPI();
  
  async function loadChapters() {
    console.log('🔍 Caricamento capitoli per ID:', mangaId);
    
    try {
      const chapters = await mangaAPI.findChapters(mangaId);
      console.log(`✅ Trovati ${chapters.length} capitoli`);
      
      if (chapters.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            📭 Nessun capitolo trovato per ${escapeHtml(mangaTitle)}
            <br><br>
            <a href="https://www.mangaworld.cx/manga/${mangaId}" target="_blank" style="color: #8b5cf6;">📖 Apri su MangaWorld</a>
          </div>
        `;
        return;
      }
      
      renderChapters(chapters);
      
    } catch (error) {
      console.error('❌ Errore:', error);
      document.getElementById('content').innerHTML = `
        <div class="error">
          ❌ Errore nel caricamento dei capitoli<br>
          <small>${error.message}</small>
          <br><br>
          <a href="https://www.mangaworld.cx/manga/${mangaId}" target="_blank" style="color: #8b5cf6;">📖 Apri su MangaWorld</a>
        </div>
      `;
    }
  }
  
  function renderChapters(chapters) {
    const contentDiv = document.getElementById('content');
    
    contentDiv.innerHTML = `
      <div class="manga-info">
        <img src="${mangaCover}" onerror="this.src='https://placehold.co/300x400/1a1a2e/a78bfa?text=${encodeURIComponent(mangaTitle)}'">
        <div>
          <h1>${escapeHtml(mangaTitle)}</h1>
          <p style="margin-top: 10px; opacity: 0.8;">📚 ${chapters.length} capitoli disponibili</p>
        </div>
      </div>
      <h2 style="margin-bottom: 20px;">📖 Capitoli</h2>
      <div class="chapters-grid" id="chaptersGrid"></div>
    `;
    
    const grid = document.getElementById('chaptersGrid');
    
    chapters.forEach(chapter => {
      const card = document.createElement('div');
      card.className = 'chapter-card';
      card.innerHTML = `
        <div class="chapter-number">${escapeHtml(chapter.chapter)}</div>
        <div>Capitolo ${escapeHtml(chapter.chapter)}</div>
        <div style="margin-top: 10px; font-size: 0.7rem;">▶ Leggi</div>
      `;
      card.onclick = () => {
        // Usa l'URL del capitolo che abbiamo dall'API
        const readUrl = chapter.url.includes('?style=list') ? chapter.url : `${chapter.url}?style=list`;
        window.location.href = `external-reader.html?url=${encodeURIComponent(readUrl)}&title=${encodeURIComponent(mangaTitle)} - Capitolo ${chapter.chapter}&source=mangaworld`;
      };
      grid.appendChild(card);
    });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Avvia il caricamento
  loadChapters();
</script>

</body>
</html>

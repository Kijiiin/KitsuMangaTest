<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dettagli Manga - KitsuManga</title>
  <link rel="stylesheet" href="../css/manga-retail.css">
</head>
<body>

<!-- Top bar fissa con logo a gradiente verde-viola -->
<div class="top-bar" id="topBar">
  <a href="../index.html" class="back-btn">← Libreria</a>
  <span class="site-logo">📚 KitsuManga</span>
  <span class="top-bar-title" id="topBarTitle">Dettagli Manga</span>
</div>

<div class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-content">
    <div class="cover-image">
      <img id="coverImg" src="" alt="Copertina">
    </div>
    <div class="hero-info">
      <h1 id="mangaTitle">Caricamento...</h1>
      <div class="meta-info">
        <span class="meta-badge" id="typeBadge">📖 FORMATO</span>
        <span class="meta-badge" id="statusBadge">⚪ Stato sconosciuto</span>
        <span class="meta-badge" id="yearBadge">📅 Anno sconosciuto</span>
      </div>
      <div class="genres" id="genresContainer"></div>
<div class="author-container" id="authorContainer" style="margin-bottom: 15px;"></div>
      <div class="description" id="descriptionContainer">
        <p>Caricamento descrizione...</p>
      </div>
      
      <!-- Pulsanti di lettura -->
      <div class="action-buttons">
        <a href="#" class="continue-btn" id="continueBtn" style="display: none;">▶ Continua a leggere</a>
        <a href="#" class="read-btn" id="readFirstBtn">▶ Inizia a leggere</a>
      </div>
      
      <!-- Pulsanti liste personalizzate -->
      <div class="list-buttons">
        <button class="list-btn" id="readingBtn" data-list="reading">📖 Sto leggendo</button>
        <button class="list-btn" id="planBtn" data-list="plan">📝 Da leggere</button>
        <button class="list-btn" id="completedBtn" data-list="completed">✅ Completato</button>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Caricamento contenuti...</div>
    </div>
  </div>
</div>

<script src="../js/manga-detail.js"></script>
</body>
</html>
